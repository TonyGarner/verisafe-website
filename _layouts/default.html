<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QZPJ2SDS21"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-QZPJ2SDS21');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | VERISAFE</title>
    {% if page.description %}
    <meta name="description" content="{{ page.description | escape }}">{% endif %}
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
    <link rel="icon" type="image/jpeg" href="{{ '/images/favicon.jpg' | relative_url }}">
</head>

<body>
    {% include header.html %}

    {{ content }}

    <footer style="background: var(--navy); color: white; text-align: center; padding: 40px 0;">
        <p style="margin-bottom: 12px; margin-top: 0;">&copy; 2026 Veri<span style="color: var(--green);">Safe</span>.
            All rights reserved.</p>
        <p style="font-size: 0.8rem; margin: 0;">
            <a href="{{ '/privacy-policy.html' | relative_url }}"
                style="color: rgba(255, 255, 255, 0.6); text-decoration: none; margin: 0 10px;"
                onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255, 255, 255, 0.6)'">Privacy
                Policy</a>
            <span style="color: rgba(255, 255, 255, 0.3);">|</span>
            <a href="{{ '/terms-and-conditions.html' | relative_url }}"
                style="color: rgba(255, 255, 255, 0.6); text-decoration: none; margin: 0 10px;"
                onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255, 255, 255, 0.6)'">Terms &
                Conditions</a>
        </p>
    </footer>
</body>

</html>
