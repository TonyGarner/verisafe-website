<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact VERISAFE - Automated WWCC Compliance | VERISAFE</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav>
    <div class="logo">
        <a href="/">
            <img src="/images/logo.png" alt="Verisafe Logo">
        </a>
    </div>

    <div class="nav-links">
        <a href="/" class="">Home</a>
        <a href="/about.html" class="">About</a>
        <a href="/pricing.html" class="">Pricing</a>
        <a href="/faq.html" class="">FAQ</a>
        <a href="/contact.html" class="active">Contact</a>
    </div>

    <div class="nav-auth">
        <a href="https://app.verisafe.com.au/" class="btn-login">Login</a>
    </div>
</nav>
    
    <section class="mission-section contact-header">
    <div class="container">
        <h1>Contact Our Team</h1>
        <p class="mission-text">
            Whether you have a technical question or want to see a live demo, we're here to help.
        </p>
        <div class="contact-buttons">
            <a href="#contact-form" class="btn-primary">Email Us</a>
            <a href="#schedule" class="btn-secondary">Schedule a Call</a>
        </div>
    </div>
</section>

<section id="contact-form" class="form-section">
    <div class="container">
        <h2>Send us a Message</h2>
        <form action="https://formspree.io/f/mwvyjrqw" method="POST" class="contact-ui-form">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="Name" placeholder="John Citizen" required>
            </div>

            <div class="form-group">
                <label>Organisation</label>
                <input type="text" name="Organisation" placeholder="Your Organisation">
            </div>

            <div class="form-group">
                <label>Work Email</label>
                <input type="email" name="Email" placeholder="john@organisation.com.au" required>
            </div>

            <div class="form-group">
                <label>How can we help?</label>
                <textarea name="Message" rows="5" placeholder="Tell us about your team..."></textarea>
            </div>
            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </div>
</section>

<section id="schedule" class="schedule-section">
    <div class="container">
        <h2>Schedule a Demo</h2>
        <p>Choose a time that works for you to chat with our team.</p>

        <!-- Calendly inline widget begin -->
        <div class="calendly-inline-widget"
            data-url="https://calendly.com/hello-verisafe?text_color=0f1e2e&primary_color=1f8a70"
            style="min-width:320px;height:700px;"></div>
        <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
        <!-- Calendly inline widget end -->

    </div>
</section>

    <footer style="background: var(--navy); color: white; text-align: center; padding: 40px 0;">
        <p>&copy; 2026 Verisafe. All rights reserved.</p>
    </footer>
</body>
</html>
